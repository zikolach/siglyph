name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, for example 0.1.0 or 0.1.0-SNAPSHOT'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish-github-packages:
    name: Publish Maven packages to GitHub Packages
    runs-on: ubuntu-latest

    env:
      MILL_MAVEN_USERNAME: ${{ github.actor }}
      MILL_MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      SIGLYPH_VERSION: ${{ inputs.version }}
      GITHUB_PACKAGES_URI: https://maven.pkg.github.com/zikolach/siglyph

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Scala and Mill dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.cache/mill
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-scala-${{ hashFiles('build.mill', '.scalafix.conf', '.scalafmt.conf') }}
          restore-keys: |
            ${{ runner.os }}-scala-

      - name: Install Mill
        run: |
          curl -fLo mill https://repo1.maven.org/maven2/com/lihaoyi/mill-dist/1.1.6/mill-dist-1.1.6-mill.sh
          chmod +x mill
          echo "$PWD" >> "$GITHUB_PATH"
          ./mill --version

      - name: Compile all modules
        run: mill __.compile

      - name: Run tests
        run: |
          command -v script
          script --version
          script -q -e -c 'mill --no-daemon __.test' /dev/null

      - name: Publish packages
        run: |
          mill mill.javalib.MavenPublishModule/publishAll \
            --releaseUri "$GITHUB_PACKAGES_URI" \
            --snapshotUri "$GITHUB_PACKAGES_URI"

      - name: Collect release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          rm -rf release-artifacts
          mkdir -p release-artifacts
          cp out/core/jar.dest/out.jar "release-artifacts/siglyph-core_3-${version}.jar"
          cp out/coreNative/jar.dest/out.jar "release-artifacts/siglyph-core_native0.5_3-${version}.jar"
          cp out/terminalJvm/jar.dest/out.jar "release-artifacts/siglyph-terminal-jvm_3-${version}.jar"
          cp out/terminalNative/jar.dest/out.jar "release-artifacts/siglyph-terminal-native_native0.5_3-${version}.jar"
          cp out/markdown/jar.dest/out.jar "release-artifacts/siglyph-markdown_3-${version}.jar"
          cp out/markdownNative/jar.dest/out.jar "release-artifacts/siglyph-markdown_native0.5_3-${version}.jar"
          cp out/image/jar.dest/out.jar "release-artifacts/siglyph-image_3-${version}.jar"
          cp out/imageNative/jar.dest/out.jar "release-artifacts/siglyph-image_native0.5_3-${version}.jar"
          cp out/extras/jar.dest/out.jar "release-artifacts/siglyph-extras_3-${version}.jar"
          cp out/extrasNative/jar.dest/out.jar "release-artifacts/siglyph-extras_native0.5_3-${version}.jar"
          ls -lh release-artifacts

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          changelog_notes="$(
            awk -v version="$version" '
              $0 ~ "^## \\[" version "\\]" { in_section = 1; print; next }
              in_section && /^## \[/ { exit }
              in_section { print }
            ' CHANGELOG.md
          )"
          if [ -z "$changelog_notes" ]; then
            changelog_notes="No changelog section found for ${GITHUB_REF_NAME}."
          fi
          notes=$(cat <<EOF
          ${changelog_notes}

          Published to GitHub Packages.

          ## SBT

          \`\`\`scala
          resolvers += "GitHub Packages: siglyph" at "https://maven.pkg.github.com/zikolach/siglyph"

          libraryDependencies ++= Seq(
            "io.github.zikolach" %% "siglyph-core" % "${version}",
            "io.github.zikolach" %% "siglyph-terminal-jvm" % "${version}",
            "io.github.zikolach" %% "siglyph-markdown" % "${version}",
            "io.github.zikolach" %% "siglyph-image" % "${version}",
            "io.github.zikolach" %% "siglyph-extras" % "${version}"
          )
          \`\`\`

          ## Mill

          \`\`\`scala
          object app extends ScalaModule {
            def scalaVersion = "3.7.4"

            def repositories = Task {
              super.repositories() ++ Seq("https://maven.pkg.github.com/zikolach/siglyph")
            }

            def mvnDeps = Seq(
              mvn"io.github.zikolach::siglyph-core::${version}",
              mvn"io.github.zikolach::siglyph-terminal-jvm::${version}",
              mvn"io.github.zikolach::siglyph-markdown::${version}",
              mvn"io.github.zikolach::siglyph-image::${version}",
              mvn"io.github.zikolach::siglyph-extras::${version}"
            )
          }
          \`\`\`

          Scala Native artifacts are also published for \`siglyph-core\`, \`siglyph-terminal-native\`, \`siglyph-markdown\`, \`siglyph-image\`, and \`siglyph-extras\`.

          ## Mill Scala Native

          \`\`\`scala
          object nativeApp extends ScalaNativeModule {
            def scalaVersion = "3.7.4"
            def scalaNativeVersion = "0.5.12"

            def repositories = Task {
              super.repositories() ++ Seq("https://maven.pkg.github.com/zikolach/siglyph")
            }

            def mvnDeps = Seq(
              mvn"io.github.zikolach::siglyph-core::${version}",
              mvn"io.github.zikolach::siglyph-terminal-native::${version}",
              mvn"io.github.zikolach::siglyph-markdown::${version}",
              mvn"io.github.zikolach::siglyph-image::${version}",
              mvn"io.github.zikolach::siglyph-extras::${version}"
            )
          }
          \`\`\`

          Private GitHub Packages consumers need credentials with \`read:packages\` access.
          EOF
          )
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes "$notes"
            gh release upload "$GITHUB_REF_NAME" release-artifacts/*.jar \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-artifacts/*.jar \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes "$notes"
          fi
