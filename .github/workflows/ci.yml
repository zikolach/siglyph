name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    name: Test and package jars
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Scala and Mill dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.cache/mill
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-scala-${{ hashFiles('build.mill', '.scalafix.conf', '.scalafmt.conf') }}
          restore-keys: |
            ${{ runner.os }}-scala-

      - name: Install Mill
        run: |
          curl -fLo mill https://repo1.maven.org/maven2/com/lihaoyi/mill-dist/1.1.6/mill-dist-1.1.6-mill.sh
          chmod +x mill
          echo "$PWD" >> "$GITHUB_PATH"
          ./mill --version

      - name: Compile all modules
        run: mill __.compile

      - name: Run tests
        run: mill __.test

      - name: Package jars
        run: mill __.jar

      - name: Collect packaged jars
        run: |
          set -euo pipefail
          rm -rf artifacts/jars
          mkdir -p artifacts/jars
          for module in \
            core \
            coreNative \
            terminalJvm \
            terminalNative \
            markdown \
            image \
            demo \
            keyTester \
            interactiveDemo \
            interactiveDemoNative \
            interactiveJvmDemo \
            interactiveNativeDemo
          do
            src="out/${module}/jar.dest/out.jar"
            if [ -f "${src}" ]; then
              cp "${src}" "artifacts/jars/${module}.jar"
            else
              echo "Missing expected jar: ${src}" >&2
              exit 1
            fi
          done
          ls -lh artifacts/jars

      - name: Upload jar artifacts
        uses: actions/upload-artifact@v7
        with:
          name: siglyph-jars
          path: artifacts/jars/*.jar
          if-no-files-found: error
